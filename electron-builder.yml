appId: com.tszones.mdxforge
productName: MDXForge
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: mdxforge
  fileAssociations:
    - ext: mdx
      name: MDX Document
      description: Markdown JSX document
      role: Editor
    - ext: md
      name: Markdown Document
      description: Markdown document
      role: Editor
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  extendInfo:
    CFBundleDocumentTypes:
      - CFBundleTypeName: MDX Document
        CFBundleTypeRole: Editor
        LSHandlerRank: Owner
        LSItemContentTypes:
          - com.mdxforge.mdx
      - CFBundleTypeName: Markdown Document
        CFBundleTypeRole: Editor
        LSHandlerRank: Alternate
        LSItemContentTypes:
          - net.daringfireball.markdown
    UTExportedTypeDeclarations:
      - UTTypeIdentifier: com.mdxforge.mdx
        UTTypeDescription: MDX Document
        UTTypeConformsTo:
          - public.text
        UTTypeTagSpecification:
          public.filename-extension:
            - mdx
          public.mime-type: text/mdx
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: mdxforge
  icon: build/icons
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: tszones
  repo: MDXforge
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
